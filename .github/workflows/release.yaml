name: Release CLI
on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            file_name: lhc-linux
            compiler: g++
          - os: macos-latest
            file_name: lhc-macos
            compiler: clang++
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Binary
        run: |
          ${{ matrix.compiler }} -std=c++20 cli.cpp -o ${{ matrix.file_name }}
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file_name }}
          path: ${{ matrix.file_name }}

  release:
    name: Create Release and Upload Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Version
        id: get_version
        run: echo "VERSION=v$(cat version.txt | xargs)" >> $GITHUB_ENV
        
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" --title "Release $VERSION" --notes "Auto release $VERSION" || echo "Release already exists"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          merge-multiple: true

      - name: Upload Assets to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$VERSION" ./assets/lhc-linux ./assets/lhc-macos --clobber
